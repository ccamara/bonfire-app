name: Docker multi-arch manifest (reusable)
on:
  workflow_call:
    inputs:
      tags:
        description: 'Space-separated tag prefixes to build manifests for (e.g. "latest-unstable" or "latest-alpha latest-beta 1.0.6-alpha.2")'
        required: true
        type: string
      flavours:
        description: 'JSON array of flavours (e.g. ["social","open_science"])'
        required: true
        type: string

jobs:
  manifest:
    name: Create and push multi-arch manifest for ${{ matrix.flavour }}
    runs-on: ubuntu-latest
    # one flavour failing must not cancel the others
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        flavour: ${{ fromJSON(inputs.flavours) }}
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Create and push manifest
        run: |
          set -e
          # Combine each requested tag prefix into a multi-arch manifest
          for TAG in ${{ inputs.tags }}; do
            images=""
            for platform in amd64 aarch64 arm32v7; do
              image=bonfirenetworks/bonfire:${TAG}-${{ matrix.flavour }}-$(echo $platform | sed 's#/#-#g')
              if docker buildx imagetools inspect $image > /dev/null 2>&1; then
                images="$images $image"
              else
                echo "Skipping missing image: $image"
              fi
            done
            if [ -n "$images" ]; then
              docker buildx imagetools create -t bonfirenetworks/bonfire:${TAG}-${{ matrix.flavour }} $images
            else
              echo "No images found for manifest for tag $TAG, skipping."
            fi
          done
